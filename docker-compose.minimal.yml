# Minimal stack: Postgres only for API + dashboard development.
# Redis/Mongo/Kafka are not started — the API degrades (no Redis cache; Mongo logging no-ops if unreachable).
#
# Usage:
#   docker compose -f docker-compose.minimal.yml up -d
#   uv sync && uv run python start_api.py
#   cd dashboard && npm install && npm run dev
#
version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: urbanclear_postgres_minimal
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-traffic_db}
      POSTGRES_USER: ${POSTGRES_USER:-traffic_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-traffic_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_minimal_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traffic_user -d traffic_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_minimal_data:
